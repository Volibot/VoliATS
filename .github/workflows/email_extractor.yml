name: HR Email Extractor
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
jobs:
  extract-emails:
    name: Extract & Insert Recruitment Emails
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      END_DATE: "2025-04-27"
      AZURE_TENANT_ID:      ${{ secrets.AZURE_TENANT_ID }}
      AZURE_CLIENT_ID:      ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET:  ${{ secrets.AZURE_CLIENT_SECRET }}
      OD_TENANT_ID:         ${{ secrets.OD_TENANT_ID }}
      OD_CLIENT_ID:         ${{ secrets.OD_CLIENT_ID }}
      OD_CLIENT_SECRET:     ${{ secrets.OD_CLIENT_SECRET }}
      OD_REFRESH_TOKEN:     ${{ secrets.OD_REFRESH_TOKEN }}
      ONEDRIVE_USER:        ${{ secrets.ONEDRIVE_USER }}
      TARGET_MAILBOX:       ${{ secrets.TARGET_MAILBOX }}
      DB_DSN:               ${{ secrets.DB_DSN }}
      DB_TABLE_NAME:        ${{ secrets.DB_TABLE_NAME }}
      ONEDRIVE_FOLDER:      ${{ secrets.ONEDRIVE_FOLDER }}
      NOTIFY_CC_EMAILS:     ${{ secrets.NOTIFY_CC_EMAILS }}
      Limit:                ${{ secrets.Limit }}
      ENABLE_NOTIFICATIONS: "true"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run email extractor
        run: python email_extractor.py
      - name: Upload log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: extractor-log-${{ github.run_id }}
          path: extractor.log
          retention-days: 7
